# Keep the old /seedhammer/ Studio URLs alive after Studio moved to its own
# repo (Gangleri42/studio, served at gangleri42.github.io/studio/). This repo
# no longer hosts the editor or composer; its Pages deploy is now just a
# redirect table so existing bookmarks and the nfc-bridge origin keep working:
#
#   /seedhammer/            -> gangleri42.github.io/studio/
#   /seedhammer/studio/     -> gangleri42.github.io/studio/
#   /seedhammer/textplate/  -> gangleri42.github.io/studio/textplate/
#
# Each is a tiny meta-refresh page with a visible link fallback. No app files,
# no build toolchain.
name: "Pages: /seedhammer redirects to Studio"

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialise Pages deploys but never cancel an in-flight one — losing the
# upload between artifact assembly and deploy is worse than queue time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assemble redirect table
        run: |
          set -euo pipefail
          mkdir -p dist/studio dist/textplate

          # Redirect stub: instant client-side forward, with a canonical link
          # and a visible fallback for the rare no-refresh case. %s is the
          # target URL (used four times). Single-quoted, so nothing but the
          # printf placeholders is interpolated.
          tmpl='<!doctype html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <title>SeedHammer Studio has moved</title>
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <link rel="canonical" href="%s">
          <meta http-equiv="refresh" content="0; url=%s">
          <style>body{font:16px/1.55 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;margin:14vh auto;max-width:40em;padding:0 1em;color:#1a1c20}@media(prefers-color-scheme:dark){body{background:#131518;color:#e7e9ec}}a{color:#9a670f}</style>
          </head>
          <body>
          <p>SeedHammer Studio has moved to <a href="%s">%s</a>. Redirecting…</p>
          </body>
          </html>
          '

          STUDIO='https://gangleri42.github.io/studio/'
          TEXTPLATE='https://gangleri42.github.io/studio/textplate/'

          printf "$tmpl" "$STUDIO"    "$STUDIO"    "$STUDIO"    "$STUDIO"    > dist/index.html
          printf "$tmpl" "$STUDIO"    "$STUDIO"    "$STUDIO"    "$STUDIO"    > dist/studio/index.html
          printf "$tmpl" "$TEXTPLATE" "$TEXTPLATE" "$TEXTPLATE" "$TEXTPLATE" > dist/textplate/index.html

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
