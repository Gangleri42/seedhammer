name: "Build image"
on:
  create:
  push:
  workflow_dispatch:

# Publishing a Release (on tag) needs write access to repo contents.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: cachix/install-nix-action@v31.10.6
      with:
        nix_path: nixpkgs=channel:nixos-25.11
    - uses: DeterminateSystems/magic-nix-cache-action@v14
    - name: Set version to GITHUB_SHA
      if: ${{ github.ref_type != 'tag' }}
      run: echo "version=${{ github.sha }}" >> $GITHUB_ENV
    - name: Set version to GITHUB_REF_NAME
      if: ${{ github.ref_type == 'tag' }}
      run: echo "version=${{ github.ref_name }}" >> $GITHUB_ENV
    - run: VERSION="${{ env.version }}" nix run .#build-firmware
    - uses: actions/upload-artifact@v7
      with:
        archive: false
        name: seedhammerii-${{ env.version }}.uf2
        path: seedhammerii-${{ env.version }}.uf2

    # On a pushed tag, publish the built firmware as a GitHub Release asset
    # so it has a stable, public, login-free download URL (Actions artifacts
    # expire and need auth). Studio's "download firmware" link points at this
    # fork's latest release. Gated to the push event so the create+push
    # double-trigger publishes exactly once.
    - name: Publish firmware to a Release
      if: ${{ github.ref_type == 'tag' && github.event_name == 'push' }}
      env:
        GH_TOKEN: ${{ github.token }}
        TAG: ${{ github.ref_name }}
        UF2: seedhammerii-${{ env.version }}.uf2
      run: |
        set -euo pipefail
        gh release create "$TAG" --title "$TAG" --generate-notes || true
        gh release upload "$TAG" "$UF2" --clobber

    # On every push to main, publish the just-built UNSIGNED firmware to a
    # rolling "edge" prerelease under a STABLE asset name (seedhammerii-latest.uf2),
    # so Studio's "Download firmware" button always serves the latest build from
    # the fork tip via a stable, login-free URL:
    #   .../releases/download/edge/seedhammerii-latest.uf2
    # Marked prerelease so it never shadows a future versioned tag release.
    - name: Publish the tip build to the rolling 'edge' release
      if: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
      env:
        GH_TOKEN: ${{ github.token }}
        UF2: seedhammerii-${{ env.version }}.uf2
      run: |
        set -euo pipefail
        cp "$UF2" seedhammerii-latest.uf2
        NOTES="Unsigned firmware, built automatically from the tip of \`main\` (${GITHUB_SHA:0:12}). Flash with the custom boot-key flow — see the Boot-key guide. Rolling build, rebuilt on every push to main; not a tagged release."
        if gh release view edge >/dev/null 2>&1; then
          gh release edit edge --prerelease --title "Latest firmware (unsigned, fork tip)" --notes "$NOTES"
        else
          gh release create edge --prerelease --title "Latest firmware (unsigned, fork tip)" --notes "$NOTES"
        fi
        gh release upload edge seedhammerii-latest.uf2 --clobber
